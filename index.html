<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC Listening Test</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --primary: #4361ee;
  --primary-light: #eef0ff;
  --accent: #f72585;
  --success: #06d6a0;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(67,97,238,0.10);
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 560px;
  padding: 40px 36px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hidden { display: none !important; }

.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
}
.logo-mark {
  width: 40px; height: 40px;
  background: var(--primary); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 15px;
}
.logo-text { font-size: 18px; font-weight: 700; color: var(--text); }
.logo-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }

.section-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.section-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

.input-group { margin-bottom: 16px; }
.input-group label { font-size: 13px; font-weight: 500; color: var(--text); display: block; margin-bottom: 6px; }
.input-group input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--primary); }

.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { opacity: 0.92; }
.btn-sm {
  width: auto; padding: 8px 18px;
  font-size: 14px; font-weight: 500; border-radius: 8px;
}

/* 진행 바 */
.progress-wrap { margin-bottom: 28px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--muted); margin-bottom: 8px;
}
.progress-bar { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
.progress-fill {
  height: 100%; background: var(--primary); border-radius: 999px;
  transition: width 0.4s ease;
}

/* 상태 표시 영역 — 고정 높이로 레이아웃 안 튀게 */
.status-area {
  height: 46px;
  margin-bottom: 20px;
  position: relative;
}

/* TTS 상태 박스 */
.tts-status {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; background: var(--primary-light);
  border-radius: 10px; font-size: 14px; color: var(--primary);
  opacity: 1; transition: opacity 0.2s;
}
.tts-status.idle { opacity: 0; pointer-events: none; }

.tts-wave { display: flex; gap: 3px; align-items: flex-end; height: 18px; flex-shrink: 0; }
.tts-wave span {
  width: 3px; background: var(--primary); border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.tts-wave span:nth-child(2) { animation-delay: 0.1s; }
.tts-wave span:nth-child(3) { animation-delay: 0.2s; }
.tts-wave span:nth-child(4) { animation-delay: 0.3s; }
@keyframes wave { 0%,100%{height:4px} 50%{height:16px} }

/* 대기 배지 — 같은 자리에 겹쳐서 fade */
.wait-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  background: var(--primary-light); color: var(--primary);
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.wait-badge.show { opacity: 1; pointer-events: auto; }

.badge-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 보기 */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border: 2px solid var(--border); border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 15px; color: var(--text);
}
.option:hover:not(.locked) { border-color: var(--primary); background: var(--primary-light); }
.option.selected { border-color: var(--primary); background: var(--primary-light); }
.option.locked   { pointer-events: none; }

/* 듣는 중: 박스/키는 보이고 텍스트만 완전히 숨김 */
.options.listening .option { pointer-events: none; }
.options.listening .option span {
  color: transparent !important;
  user-select: none;
  pointer-events: none;
}
.option-key {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.option.selected .option-key { background: var(--primary); border-color: var(--primary); color: white; }

/* 결과 */
.score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 6px solid var(--primary);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
.score-num   { font-size: 36px; font-weight: 700; color: var(--primary); line-height: 1; }
.score-total { font-size: 13px; color: var(--muted); margin-top: 2px; }

.result-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.result-row:last-child { border-bottom: none; }
.result-badge {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.result-badge.o { background: #f0fdf9; color: var(--success); }
.result-badge.x { background: #fff0f6; color: var(--accent); }

.divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<!-- ① 시작 화면 -->
<div class="card" id="startScreen">
  <div class="logo">
    <div class="logo-mark">ESC</div>
    <div>
      <div class="logo-text">Listening Test</div>
      <div class="logo-sub">Edu Space Care</div>
    </div>
  </div>
  <div class="section-title">안녕하세요 👋</div>
  <div class="section-sub">이름을 입력한 후 시작하세요.</div>
  <div class="input-group">
    <label>이름</label>
    <input type="text" id="studentName" placeholder="홍길동">
  </div>
  <button class="btn btn-primary" id="startBtn">시작하기 →</button>
</div>

<!-- ② 시험 화면 -->
<div class="card hidden" id="testScreen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">세트 1 / 10</span>
      <span id="progressCount">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="status-area">
    <div class="tts-status idle" id="ttsStatus">
      <div class="tts-wave"><span></span><span></span><span></span><span></span></div>
      <span id="ttsText">지문을 듣고 있습니다...</span>
    </div>
    <div class="wait-badge" id="waitBadge">
      <div class="badge-dot"></div>
      <span>선택지를 고르세요</span>
    </div>
  </div>

  <div class="options listening" id="optionsWrap"></div>

</div>

<!-- ③ 결과 화면 -->
<div class="card hidden" id="resultScreen">
  <div class="logo">
    <div class="logo-mark">ESC</div>
    <div>
      <div class="logo-text">시험 완료</div>
      <div class="logo-sub" id="resultName"></div>
    </div>
  </div>
  <div class="score-circle">
    <div class="score-num" id="scoreNum">0</div>
    <div class="score-total" id="scoreTotal">/ 0문제</div>
  </div>
  <div id="resultList"></div>
  <div class="divider"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-primary" id="downloadBtn">결과 다운로드 📥</button>
    <button class="btn btn-sm btn-primary" id="retryBtn"
      style="background:#f1f3ff;color:var(--primary);flex-shrink:0;">다시하기</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 스크립트 데이터 (TTS용 지문 포함)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AUDIO_BASE = {
  '초보': 'https://lanssam.github.io/ESC_Listening_Test/lt/low/',
  '중수': 'https://lanssam.github.io/ESC_Listening_Test/lt/mid/',
  '고수': 'https://lanssam.github.io/ESC_Listening_Test/lt/high/',
};
function getBase(level) { return AUDIO_BASE[level] || AUDIO_BASE['초보']; }

// 각 세트에 passage 필드 = TTS로 읽을 지문
const LOW = [
  { audio_id:"low1", _level:"초보",
    passage:"빨간 옷을 입은 목수가 5개의 못과 2개의 망치를 들고 보라색 울타리를 고치고 있습니다. 초록색 긴 생머리에 연두색 원피스를 입은 목수의 아내가 옥수수 8개와 감자 7개를 쪄서 새참으로 나누어 먹습니다.",
    q1:"목수가 입은 옷의 색은?",           A1:"빨간색",  B1:"파란색",   C1:"노란색",   D1:"초록색",        E1:"모르겠음", answer1:"A",
    q2:"목수가 고치는 울타리의 색은?",       A2:"빨간색",  B2:"파란색",   C2:"보라색",   D2:"주황색",        E2:"모르겠음", answer2:"C",
    q3:"목수의 아내가 찐 옥수수의 수는?",    A3:"5개",    B3:"6개",     C3:"7개",     D3:"8개",           E3:"모르겠음", answer3:"D",
    q4:"목수의 아내 원피스 색은?",          A4:"하늘색",  B4:"연두색",   C4:"분홍색",   D4:"보라색",        E4:"모르겠음", answer4:"B" },

  { audio_id:"low2", _level:"초보",
    passage:"파란 카디건을 입은 사서가 목요일 오후 3시에 책 23권을 새 서가에 정리하고 있습니다. 안경을 쓴 남학생 두 명과 머리를 묶은 여학생 한 명이 창가 자리에서 함께 수학 공부를 하고 있으며, 책상 위에는 빨간 형광펜 4개와 초록 공책 2권이 놓여 있습니다.",
    q1:"사서가 입은 옷은?",               A1:"파란 카디건", B1:"흰 셔츠",   C1:"노란 재킷",  D1:"검은 코트",    E1:"모르겠음", answer1:"A",
    q2:"사서가 정리한 책의 수는?",          A2:"21권",    B2:"22권",    C2:"23권",    D2:"24권",          E2:"모르겠음", answer2:"C",
    q3:"창가에서 공부하는 학생 수는?",       A3:"2명",    B3:"3명",     C3:"4명",     D3:"5명",           E3:"모르겠음", answer3:"B",
    q4:"책상 위 형광펜 색과 수는?",         A4:"파란 형광펜 2개", B4:"빨간 형광펜 4개", C4:"빨간 형광펜 3개", D4:"초록 형광펜 4개", E4:"모르겠음", answer4:"B" },

  { audio_id:"low3", _level:"초보",
    passage:"흰 앞치마를 두른 과일 장수 할머니가 노란 파라솔 아래에서 복숭아 15개, 자두 20개, 포도 3송이를 팔고 있습니다. 오전 10시부터 장사를 시작한 할머니는 빨간 운동화를 신고 있으며, 옆에는 손녀로 보이는 단발머리 아이가 분홍 우산을 들고 서 있습니다.",
    q1:"파라솔의 색은?",                  A1:"빨간색",  B1:"파란색",   C1:"흰색",    D1:"노란색",         E1:"모르겠음", answer1:"D",
    q2:"복숭아는 몇 개?",                 A2:"12개",   B2:"13개",    C2:"15개",    D2:"18개",           E2:"모르겠음", answer2:"C",
    q3:"할머니가 신은 신발은?",            A3:"흰 슬리퍼", B3:"검은 구두", C3:"빨간 운동화", D3:"노란 장화",  E3:"모르겠음", answer3:"C",
    q4:"아이가 들고 있는 우산 색은?",       A4:"노란색",  B4:"분홍색",   C4:"파란색",   D4:"초록색",        E4:"모르겠음", answer4:"B" },

  { audio_id:"low4", _level:"초보",
    passage:"소풍날 아침 초등학교 3학년 교실에서 선생님이 출석을 부르고 있습니다. 파란 모자를 쓴 남학생과 노란 리본을 맨 여학생을 포함해 오늘 결석 없이 28명 전원이 등교했습니다. 선생님은 초록색 가방에 김밥 4줄, 사과 6개, 주스 28개를 챙겨 두었습니다.",
    q1:"오늘 등교한 학생 수는?",           A1:"26명",   B1:"27명",    C1:"28명",    D1:"30명",           E1:"모르겠음", answer1:"C",
    q2:"선생님 가방 색은?",               A2:"파란색",  B2:"빨간색",   C2:"초록색",   D2:"보라색",         E2:"모르겠음", answer2:"C",
    q3:"챙긴 김밥 수는?",                A3:"3줄",    B3:"4줄",     C3:"5줄",     D3:"6줄",            E3:"모르겠음", answer3:"B",
    q4:"파란 모자를 쓴 학생은?",           A4:"여학생",  B4:"남학생",   C4:"선생님",   D4:"알 수 없음",     E4:"모르겠음", answer4:"B" },

  { audio_id:"low5", _level:"초보",
    passage:"일요일 오후 주황색 티셔츠를 입은 아버지가 아들과 함께 동물원에 갔습니다. 기린 2마리, 코끼리 4마리, 홍학 9마리가 있는 구역을 지나 펭귄관에 도착했습니다. 펭귄관 앞 매점에서 아이스크림 3개와 음료수 2잔을 사서 하늘색 벤치에 앉아 먹었습니다.",
    q1:"아버지 티셔츠 색은?",             A1:"빨간색",  B1:"노란색",   C1:"주황색",   D1:"초록색",         E1:"모르겠음", answer1:"C",
    q2:"홍학은 몇 마리?",                A2:"7마리",   B2:"8마리",    C2:"9마리",    D2:"10마리",         E2:"모르겠음", answer2:"C",
    q3:"매점에서 산 아이스크림 수는?",      A3:"2개",    B3:"3개",     C3:"4개",     D3:"5개",            E3:"모르겠음", answer3:"B",
    q4:"앉아서 먹은 벤치 색은?",           A4:"초록색",  B4:"노란색",   C4:"하늘색",   D4:"흰색",           E4:"모르겠음", answer4:"C" },

  { audio_id:"low6", _level:"초보",
    passage:"화요일 저녁 요리 교실에서 체크무늬 앞치마를 두른 강사가 파스타를 만드는 법을 가르치고 있습니다. 재료로는 토마토 7개, 양파 3개, 마늘 12쪽, 올리브오일이 필요합니다. 수강생 9명 중 5명은 여성이고 4명은 남성이며, 모두 빨간 앞치마를 두르고 있습니다.",
    q1:"강사의 앞치마 무늬는?",           A1:"줄무늬",  B1:"체크무늬",  C1:"꽃무늬",   D1:"민무늬",         E1:"모르겠음", answer1:"B",
    q2:"필요한 토마토 수는?",             A2:"5개",    B2:"6개",     C2:"7개",     D2:"9개",            E2:"모르겠음", answer2:"C",
    q3:"수강생 중 남성 수는?",            A3:"3명",    B3:"4명",     C3:"5명",     D3:"6명",            E3:"모르겠음", answer3:"B",
    q4:"수강생의 앞치마 색은?",           A4:"파란색",  B4:"초록색",   C4:"빨간색",   D4:"주황색",         E4:"모르겠음", answer4:"C" },

  { audio_id:"low7", _level:"초보",
    passage:"이른 아침 해변에서 하얀 모자를 쓴 노인이 낚싯대 2개를 드리우고 앉아 있습니다. 파도 소리와 함께 갈매기 7마리가 하늘을 날고, 멀리 빨간 등대가 보입니다. 노인의 양동이에는 이미 고등어 4마리와 전갱이 6마리가 담겨 있었습니다.",
    q1:"노인이 쓴 모자 색은?",            A1:"파란색",  B1:"노란색",   C1:"하얀색",   D1:"검은색",         E1:"모르겠음", answer1:"C",

// MP3 재생
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentAudio = null;
function playMP3(url, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.onended = () => { currentAudio = null; if (onEnd) onEnd(); };
  currentAudio.onerror = () => {
    currentAudio = null;
    console.warn('오디오 로드 실패:', url);
    if (onEnd) onEnd();
  };
  currentAudio.play();
}

// 세트 뽑기: 초보3 + 중수4 + 고수3
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function pickSets() {
  function sample(arr, n) {
    return [...arr].sort(() => Math.random() - 0.5).slice(0, Math.min(n, arr.length));
  }
  return [
    ...sample(LOW,  3),
    ...sample(MID,  4),
    ...sample(HIGH, 3)
  ];
}

function countQ(set) {
  let n = 0; while (set[`q${n+1}`]) n++; return n;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 상태
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let questions = [], index = 0, currentQIdx = 0, totalQ = 0;
let studentName = '';
let resultData = [];

function showScreen(id) {
  ['startScreen','testScreen','resultScreen'].forEach(s =>
    document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setListening(text) {
  document.getElementById('ttsText').textContent = text;
  document.getElementById('ttsStatus').classList.remove('idle');
  document.getElementById('waitBadge').classList.remove('show');
  document.getElementById('optionsWrap').classList.add('listening');
}
function setWaiting() {
  document.getElementById('ttsStatus').classList.add('idle');
  document.getElementById('waitBadge').classList.add('show');
  document.getElementById('optionsWrap').classList.remove('listening');
}

// 시작
document.getElementById('startBtn').onclick = () => {
  const name = document.getElementById('studentName').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  studentName = name;
  questions = pickSets();
  index = 0; currentQIdx = 0; resultData = [];
  showScreen('testScreen');
  startSet();
};

function startSet() {
  const set = questions[index];
  currentQIdx = 0;
  totalQ = countQ(set);

  // 진행 바
  document.getElementById('progressText').textContent = `세트 ${index + 1} / ${questions.length}`;
  document.getElementById('progressCount').textContent = `${Math.round((index / questions.length) * 100)}%`;
  document.getElementById('progressFill').style.width = (index / questions.length * 100) + '%';

  setListening('지문을 듣고 있습니다...');
  buildOptions();

  // 지문 mp3 재생 → 완료 후 질문 mp3
  const passageURL = getBase(set._level) + set.audio_id + '_passage.mp3';
  playMP3(passageURL, playQuestion);
}

function buildOptions() {
  const set = questions[index];
  const n = currentQIdx + 1;
  const keys = ['A','B','C','D','E'];

  const opts = keys.map(k => ({
    key: k,
    text: set[`${k}${n}`] || (k === 'E' ? '모르겠음' : '')
  })).filter(o => o.text);

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  opts.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option locked';
    div.innerHTML = `<div class="option-key">${opt.key}</div><span>${opt.text}</span>`;
    div.dataset.text = opt.text;
    wrap.appendChild(div);
  });
}

function playQuestion() {
  const set = questions[index];
  const qNum = currentQIdx + 1;
  const qText = set[`q${qNum}`];

  setListening('질문을 듣고 있습니다...');

  if (currentQIdx > 0) buildOptions();

  const qURL = getBase(set._level) + set.audio_id + '_q' + qNum + '.mp3';
  playMP3(qURL, () => {
    setWaiting();
    unlockOptions();
  });
}

function unlockOptions() {
  const set = questions[index];
  const n = currentQIdx + 1;
  const correctKey = set[`answer${n}`];
  const keys = ['A','B','C','D','E'];
  const opts = keys.map(k => ({
    key: k,
    text: set[`${k}${n}`] || (k === 'E' ? '모르겠음' : '')
  })).filter(o => o.text);

  window._correctText = opts.find(o => o.key === correctKey)?.text || '';

  document.querySelectorAll('.option').forEach(div => {
    div.classList.remove('locked');
    div.onclick = () => handleAnswer(div, div.dataset.text);
  });
}

function handleAnswer(clicked, chosenText) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('locked'); o.onclick = null;
  });
  clicked.classList.remove('locked');
  clicked.classList.add('selected');

  const set = questions[index];
  resultData.push({
    이름: studentName,
    단계: set._level,
    세트: index + 1,
    문항: currentQIdx + 1,
    선택: chosenText,
    정답: window._correctText,
    결과: chosenText === window._correctText ? 'O' : 'X'
  });

  setTimeout(() => {
    if (currentQIdx < totalQ - 1) {
      currentQIdx++;
      playQuestion();
    } else {
      index < questions.length - 1 ? (index++, startSet()) : showResult();
    }
  }, 700);
}

function showResult() {
  showScreen('resultScreen');
  document.getElementById('resultName').textContent = studentName + ' 님';

  const total   = resultData.length;
  const correct = resultData.filter(r => r.결과 === 'O').length;
  document.getElementById('scoreNum').textContent   = correct;
  document.getElementById('scoreTotal').textContent = `/ ${total}문제`;

  document.getElementById('resultList').innerHTML = resultData.map(r => `
    <div class="result-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">세트${r.세트}·${r.문항}번</span>
      <span style="font-size:14px;flex:1;margin:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        ${r.결과 === 'X'
          ? `<span style="text-decoration:line-through;color:var(--accent);">${r.선택}</span> → <span style="color:#059669;">${r.정답}</span>`
          : r.선택}
      </span>
      <div class="result-badge ${r.결과 === 'O' ? 'o' : 'x'}">${r.결과}</div>
    </div>
  `).join('');
}

document.getElementById('downloadBtn').onclick = () => {
  const ws = XLSX.utils.json_to_sheet(resultData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'RESULT');
  XLSX.writeFile(wb, `${studentName}_시험결과.xlsx`);
};

document.getElementById('retryBtn').onclick = () => {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  showScreen('startScreen');
};
</script>
</body>
